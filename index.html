<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pizzeria Bella Napoli</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        nav {
            background-color: #333;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        section {
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <h1>🍕 Pizzeria Bella Napoli 🍕</h1>

    <nav>
        <a href="#pizze">Pizze</a>
        <a href="#dolci">Dolci</a>
        <a href="#bevande">Bevande</a>
    </nav>

    <section id="pizze">
        <h2>Menù Pizze</h2>
        <p>Qui verranno aggiunte le pizze dallo sviluppatore A.</p>
    </section>

    <section id="dolci">
        <h2>Menù Dolci</h2>
        <p>Qui verranno aggiunti i dolci dallo sviluppatore B.</p>
    </section>

    <section id="bevande">
        <h2>Menù Bevande</h2>
        <p>Qui verranno aggiunte le bevande dallo sviluppatore C.</p>
    </section>
</body>
</html>
